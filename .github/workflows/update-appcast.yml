name: Update Appcast

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  generate-appcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate appcast.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -e
          cd $GITHUB_WORKSPACE
          RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/latest")
          TAG_NAME=$(echo "$RESPONSE" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION=$(echo "$TAG_NAME" | sed 's/v//')
          ASSET_URL=$(echo "$RESPONSE" | grep -o '"browser_download_url": "[^"]*\.zip"' \
            | head -1 | sed 's/"browser_download_url": "//;s/"//')
          ASSET_SIZE=$(curl -s -I -H "Authorization: token $GITHUB_TOKEN" "$ASSET_URL" \
            | grep -i content-length | awk '{print $2}' | tr -d '\r')
          echo "Tag: $TAG_NAME"
          echo "Asset URL: $ASSET_URL"
          echo "Asset Size: $ASSET_SIZE"
          echo '<?xml version="1.0" encoding="UTF-8"?>' > appcast.xml
          echo '<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">' >> appcast.xml
          echo '<channel><title>Cat-Claude-Island Updates</title>' >> appcast.xml
          echo '<link>https://cstdr.github.io/cat-claude-island/appcast.xml</link>' >> appcast.xml
          echo '<description>Most recent updates</description><language>en</language>' >> appcast.xml
          echo "<item><title>$TAG_NAME</title>" >> appcast.xml
          echo "<sparkle:version>$VERSION</sparkle:version>" >> appcast.xml
          echo "<sparkle:shortVersionString>$TAG_NAME</sparkle:shortVersionString>" >> appcast.xml
          echo "<sparkle:releaseNotesLink>https://$GITHUB_REPOSITORY/releases/tag/$TAG_NAME</sparkle:releaseNotesLink>" >> appcast.xml
          echo "<enclosure url=\"$ASSET_URL\" length=\"$ASSET_SIZE\" type=\"application/octet-stream\"/>" >> appcast.xml
          echo '</item></channel></rss>' >> appcast.xml
          mkdir -p _site
          cp appcast.xml _site/
          cat _site/appcast.xml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
