name: Update Appcast

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-appcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate appcast
        uses: tstevens/github-sparkle@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          github_repository: ${{ github.repository }}
          asset_extension: zip
          asset_name: Claude Island

      - name: Upload appcast
        uses: actions/upload-pages-artifact@v3
        with:
          path: appcast.xml

      - name: Deploy to GitHub Pages
        if: success()
        uses: actions/deploy-pages@v4
