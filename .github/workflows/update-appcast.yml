name: Update Appcast

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-appcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate appcast.xml
        id: generate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # Get latest release info
          RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/latest")

          TAG_NAME=$(echo "$RESPONSE" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION=$(echo $TAG_NAME | sed 's/v//')

          # Find the zip asset
          ASSET_URL=$(echo "$RESPONSE" | grep -o '"browser_download_url": "[^"]*\.zip"' \
            | head -1 | sed 's/"browser_download_url": "//;s/"//')

          # Get asset size
          ASSET_SIZE=$(curl -s -I -H "Authorization: token $GITHUB_TOKEN" "$ASSET_URL" \
            | grep -i content-length | awk '{print $2}' | tr -d '\r')

          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "ASSET_URL=$ASSET_URL" >> $GITHUB_OUTPUT
          echo "ASSET_SIZE=$ASSET_SIZE" >> $GITHUB_OUTPUT

      - name: Create appcast.xml
        run: |
          cat > appcast.xml << EOF
<?xml version="1.0" encoding="UTF-8"?>
<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
  <channel>
    <title>Cat-Claude-Island Updates</title>
    <link>https://cstdr.github.io/cat-claude-island/appcast.xml</link>
    <description>Most recent updates</description>
    <language>en</language>
    <item>
      <title>${{ steps.generate.outputs.TAG_NAME }}</title>
      <sparkle:version>${{ steps.generate.outputs.VERSION }}</sparkle:version>
      <sparkle:shortVersionString>${{ steps.generate.outputs.TAG_NAME }}</sparkle:shortVersionString>
      <sparkle:releaseNotesLink>https://github.com/${{ github.repository }}/releases/tag/${{ steps.generate.outputs.TAG_NAME }}</sparkle:releaseNotesLink>
      <enclosure url="${{ steps.generate.outputs.ASSET_URL }}"
                 length="${{ steps.generate.outputs.ASSET_SIZE }}"
                 type="application/octet-stream"/>
    </item>
  </channel>
</rss>
EOF

          cat appcast.xml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: appcast
          path: appcast.xml
