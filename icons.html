function drawIcon(canvasId, pixels, offsetX, offsetY, canvasW, canvasH) {
    const canvas = document.getElementById(canvasId);
    canvas.width = canvasW || 32;
    canvas.height = canvasH || 32;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    pixels.forEach(([x, y, color]) => {
        ctx.fillStyle = color;
        ctx.fillRect(x + (offsetX || 0), y + (offsetY || 0), 1, 1);
    });
}
